<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Сторінка завершення опитування з автоматичним переходом на випадкове джерело."
    />
    <title>Опитування завершено | Випадковий перехід</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="layout-shell">
      <main class="box">
        <span class="badge">Опитування</span>
        <h1>Дякуємо за участь</h1>
        <p class="subtitle">
          Дослідження «Психологічна безпека та педагогічна доцільність ШІ-генерованого дитячого
          контенту для дошкільників у сучасному медіасередовищі».
        </p>
        <hr class="divider" />

        <section class="media-block" aria-label="Автоматичний перехід">
          <img
            class="gif"
            src="assets/dice_animation.gif"
            alt="Анімація кидка кубика, що символізує випадковий вибір"
            width="360"
            height="360"
            decoding="async"
          />
          <div class="status-panel">
            <p class="timer-row">
              <span class="label">Переходимо через</span>
              <span id="timer" aria-live="polite">-</span>
              <span class="label">с</span>
            </p>
            <div class="progress-wrap" aria-hidden="true">
              <div id="progressBar"></div>
            </div>
          </div>
        </section>

        <p id="fallback"></p>
        <div class="actions">
          <button id="goNowBtn" type="button">Перейти зараз</button>
        </div>

        <p class="author">Створено Савін Дмитрій, 4-А, Бердичівський педагогічний фаховий коледж</p>
        <noscript>Увімкніть JavaScript, щоб працював автоматичний перехід.</noscript>
      </main>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
