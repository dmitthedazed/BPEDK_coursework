<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Автоматичний перехід до відеофрагмента V6" />
  <title>Відеофрагмент V6 — Курсова 2026</title>
  <link rel="stylesheet" href="../../assets/shared.css" />
  <link rel="stylesheet" href="../../survey/survey.css" />
</head>
<body class="theme-parents">
  <main class="redirect-page">
    <div class="redirect-card glass-card">
      <span class="badge">Відеофрагмент V6</span>
      <h1>Підготовка переходу</h1>
      <p class="redirect-subtitle">Кілька секунд і матеріал відкриється автоматично.</p>
      <section class="redirect-media" aria-label="Автоматичний перехід">
        <img class="redirect-gif" src="../../assets/dice_animation.gif" alt="Анімація підготовки переходу" width="220" height="220" decoding="async" />
        <div class="redirect-status">
          <p class="timer-row"><span>Переходимо через</span> <span id="timer" aria-live="polite">-</span> <span>с</span></p>
          <div class="progress" aria-hidden="true"><div id="progressBar"></div></div>
        </div>
      </section>
      <p id="fallback"></p>
      <div class="redirect-actions"><button id="goNowBtn" type="button">Перейти зараз</button></div>
      <p class="redirect-note">Код фрагмента: V6.</p>
    </div>
  </main>

  <script>window.SURVEY_LINKS = ["https://drive.google.com/file/d/1Nht4L9CZ7lAaQ78M-RqYlBnyzeToMpUe/view?usp=drive_link"];</script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="../../survey/survey.js" defer></script>
</body>
</html>
