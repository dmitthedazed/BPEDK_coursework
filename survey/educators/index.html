<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Опитування для вихователів закладів дошкільної освіти — курсова робота Савіна Д.С." />
  <title>Опитування вихователів — Курсова 2026</title>
  <link rel="stylesheet" href="../../assets/shared.css" />
  <link rel="stylesheet" href="../survey.css" />
</head>
<body class="theme-educators">
  <!-- NAV -->
  <nav class="site-nav">
    <a class="site-nav-logo" href="../../">Курсова · 2026</a>
    <a class="site-nav-back" href="../../">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 3L5 8l5 5"/></svg>
      На головну
    </a>
  </nav>

  <main class="redirect-page">
    <div class="redirect-card glass-card">
      <span class="badge">Опитування вихователів</span>
      <h1>Дякуємо за участь</h1>
      <p class="redirect-subtitle">Кілька секунд і для вас відкриється випадковий матеріал.</p>

      <section class="redirect-media" aria-label="Автоматичний перехід">
        <img
          class="redirect-gif"
          src="../../assets/dice_animation.gif"
          alt="Анімація випадкового вибору"
          width="220"
          height="220"
          decoding="async"
        />
        <div class="redirect-status">
          <p class="timer-row">
            <span>Переходимо через</span>
            <span id="timer" aria-live="polite">-</span>
            <span>с</span>
          </p>
          <div class="progress" aria-hidden="true">
            <div id="progressBar"></div>
          </div>
        </div>
      </section>

      <p id="fallback"></p>
      <div class="redirect-actions">
        <button id="goNowBtn" type="button">Перейти зараз</button>
      </div>
      <p class="redirect-note">Група: вихователі.</p>
    </div>
  </main>

  <footer class="site-footer">
    <span>Курсова робота · Савін Д.С. · 2026</span>
  </footer>

  <script src="links.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="../survey.js" defer></script>
</body>
</html>
